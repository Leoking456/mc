<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Game Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px;
      text-align: center;
      background: #020617;
      font-size: 24px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    footer {
      margin-top: 20px;
      padding: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<header>
  My Custom Game Website
</header>

<div class="container">
  <!-- Make sure your game files are inside /game folder -->
  <iframe src="/game/index.html"></iframe>
</div>

<footer>
  Hosted by you 🚀
</footer>

</body>
</html>
